<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- Game Controller -->
  <!-- Body -->
  <path d="M28,85 Q25,60 50,55 L150,55 Q175,60 172,85 L165,145 Q162,165 145,165 Q128,165 118,148 L82,148 Q72,165 55,165 Q38,165 35,145 Z"
        fill="#2A2A3A"/>
  <path d="M28,85 Q25,60 50,55 L150,55 Q175,60 172,85 L165,145 Q162,165 145,165 Q128,165 118,148 L82,148 Q72,165 55,165 Q38,165 35,145 Z"
        fill="none" stroke="#444" stroke-width="2"/>
  <!-- D-pad -->
  <rect x="52" y="88" width="14" height="40" rx="3" fill="#444"/>
  <rect x="45" y="95" width="28" height="14" rx="3" fill="#444"/>
  <circle cx="59" cy="108" r="6" fill="#333"/>
  <!-- Face buttons -->
  <circle cx="138" cy="95"  r="9" fill="#E74C3C"/>
  <circle cx="120" cy="108" r="9" fill="#3498DB"/>
  <circle cx="138" cy="121" r="9" fill="#2ECC71"/>
  <circle cx="156" cy="108" r="9" fill="#F1C40F"/>
  <!-- Button letters -->
  <text x="138" y="99"  text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">▲</text>
  <text x="120" y="112" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">■</text>
  <text x="138" y="125" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">✕</text>
  <text x="156" y="112" text-anchor="middle" font-size="9" fill="white" font-weight="bold" font-family="sans-serif">●</text>
  <!-- Start/Select -->
  <rect x="84"  y="98" width="14" height="6" rx="3" fill="#555"/>
  <rect x="102" y="98" width="14" height="6" rx="3" fill="#555"/>
  <!-- Analog sticks -->
  <circle cx="80"  cy="130" r="13" fill="#333" stroke="#444" stroke-width="1.5"/>
  <circle cx="120" cy="130" r="13" fill="#333" stroke="#444" stroke-width="1.5"/>
  <circle cx="80"  cy="130" r="7"  fill="#3A3A4A"/>
  <circle cx="120" cy="130" r="7"  fill="#3A3A4A"/>
  <!-- Shoulder bumps -->
  <rect x="35" y="50" width="40" height="12" rx="6" fill="#333"/>
  <rect x="125" y="50" width="40" height="12" rx="6" fill="#333"/>
</svg>
