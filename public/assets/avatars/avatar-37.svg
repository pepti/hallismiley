<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- Ice Crystal / Snowflake -->
  <g stroke="#88DDFF" stroke-linecap="round" fill="none">
    <!-- Main axes -->
    <line x1="100" y1="18"  x2="100" y2="182" stroke-width="5"/>
    <line x1="18"  y1="100" x2="182" y2="100" stroke-width="5"/>
    <line x1="41"  y1="41"  x2="159" y2="159" stroke-width="5"/>
    <line x1="159" y1="41"  x2="41"  y2="159" stroke-width="5"/>
    <!-- Branch details - vertical -->
    <line x1="86"  y1="52"  x2="100" y2="38" stroke-width="3"/>
    <line x1="114" y1="52"  x2="100" y2="38" stroke-width="3"/>
    <line x1="86"  y1="148" x2="100" y2="162" stroke-width="3"/>
    <line x1="114" y1="148" x2="100" y2="162" stroke-width="3"/>
    <!-- Branch details - horizontal -->
    <line x1="52"  y1="86"  x2="38"  y2="100" stroke-width="3"/>
    <line x1="52"  y1="114" x2="38"  y2="100" stroke-width="3"/>
    <line x1="148" y1="86"  x2="162" y2="100" stroke-width="3"/>
    <line x1="148" y1="114" x2="162" y2="100" stroke-width="3"/>
    <!-- Branch details - diagonal NE -->
    <line x1="138" y1="52"  x2="148" y2="40" stroke-width="3"/>
    <line x1="148" y1="62"  x2="160" y2="52" stroke-width="3"/>
    <!-- Branch details - diagonal SW -->
    <line x1="62"  y1="148" x2="52"  y2="160" stroke-width="3"/>
    <line x1="52"  y1="138" x2="40"  y2="148" stroke-width="3"/>
    <!-- Branch details - diagonal NW -->
    <line x1="62"  y1="52"  x2="52"  y2="40" stroke-width="3"/>
    <line x1="52"  y1="62"  x2="40"  y2="52" stroke-width="3"/>
    <!-- Branch details - diagonal SE -->
    <line x1="138" y1="148" x2="148" y2="160" stroke-width="3"/>
    <line x1="148" y1="138" x2="160" y2="148" stroke-width="3"/>
  </g>
  <!-- Center gem -->
  <circle cx="100" cy="100" r="16" fill="#44AADD" stroke="#88DDFF" stroke-width="3"/>
  <circle cx="100" cy="100" r="9"  fill="#AAEEFF"/>
  <circle cx="95"  cy="95"  r="4"  fill="white" opacity="0.8"/>
  <!-- Outer sparkle dots -->
  <g fill="#AAEEFF">
    <circle cx="100" cy="18"  r="5"/>
    <circle cx="100" cy="182" r="5"/>
    <circle cx="18"  cy="100" r="5"/>
    <circle cx="182" cy="100" r="5"/>
    <circle cx="41"  cy="41"  r="4"/>
    <circle cx="159" cy="41"  r="4"/>
    <circle cx="41"  cy="159" r="4"/>
    <circle cx="159" cy="159" r="4"/>
  </g>
</svg>
