<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- Arcade Joystick -->
  <!-- Base plate -->
  <rect x="30" y="120" width="140" height="55" rx="8" fill="#2A2A2A"/>
  <rect x="30" y="120" width="140" height="55" rx="8" fill="none" stroke="#444" stroke-width="2"/>
  <!-- Joystick shaft -->
  <rect x="88" y="60" width="24" height="70" rx="10" fill="#333"/>
  <rect x="92" y="64" width="6" height="62" rx="3" fill="#555"/>
  <!-- Ball top -->
  <circle cx="100" cy="54" r="22" fill="#E74C3C"/>
  <ellipse cx="90" cy="44" rx="8" ry="5" fill="rgba(255,255,255,0.3)" transform="rotate(-30,90,44)"/>
  <!-- Buttons -->
  <circle cx="130" cy="142" r="14" fill="#E74C3C"/>
  <circle cx="158" cy="142" r="14" fill="#3498DB"/>
  <circle cx="144" cy="163" r="14" fill="#F1C40F"/>
  <!-- Button shine -->
  <circle cx="125" cy="137" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="153" cy="137" r="5" fill="rgba(255,255,255,0.25)"/>
  <circle cx="139" cy="158" r="5" fill="rgba(255,255,255,0.25)"/>
  <!-- Base bolts -->
  <circle cx="42" cy="132" r="4" fill="#555"/>
  <circle cx="42" cy="163" r="4" fill="#555"/>
  <circle cx="158" cy="163" r="4" fill="#555"/>
</svg>
