<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- Sonic Ring -->
  <circle cx="100" cy="100" r="62" fill="none" stroke="#F4C542" stroke-width="22"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#FFE87A" stroke-width="8"
          stroke-dasharray="80 310" stroke-dashoffset="-30"/>
