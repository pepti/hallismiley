<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- 8-bit pixel heart -->
  <g fill="#E74C3C" transform="translate(20,30)">
    <rect x="40" y="0"  width="20" height="20"/>
    <rect x="60" y="0"  width="20" height="20"/>
    <rect x="100" y="0" width="20" height="20"/>
    <rect x="120" y="0" width="20" height="20"/>
    <rect x="20" y="20" width="20" height="20"/>
    <rect x="40" y="20" width="20" height="20"/>
    <rect x="60" y="20" width="20" height="20"/>
    <rect x="80" y="20" width="20" height="20"/>
    <rect x="100" y="20" width="20" height="20"/>
    <rect x="120" y="20" width="20" height="20"/>
    <rect x="140" y="20" width="20" height="20"/>
    <rect x="20" y="40" width="120" height="20"/>
    <rect x="20" y="60" width="120" height="20"/>
    <rect x="40" y="80" width="80" height="20"/>
    <rect x="40" y="100" width="80" height="20"/>
    <rect x="60" y="120" width="40" height="20"/>
    <rect x="80" y="140" width="20" height="20"/>
    <!-- Highlight pixels -->
    <rect x="40" y="20" width="20" height="20" fill="#FF8080"/>
    <rect x="60" y="20" width="20" height="20" fill="#FF8080"/>
    <rect x="100" y="20" width="20" height="20" fill="#FF8080"/>
  </g>
</svg>
