<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="#0A1428"/>
  <!-- Potion bottle -->
  <!-- Cork -->
  <rect x="84" y="22" width="32" height="18" rx="4" fill="#8B6914"/>
  <rect x="80" y="36" width="40" height="10" rx="3" fill="#6A5010"/>
  <!-- Neck -->
  <rect x="78" y="46" width="44" height="28" rx="4" fill="#9B59B6"/>
  <rect x="82" y="46" width="8" height="28" fill="#B07ACC"/>
  <!-- Bottle body -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="#9B59B6"/>
  <!-- Liquid (green magic) -->
  <ellipse cx="100" cy="148" rx="48" ry="40" fill="#2ECC71"/>
  <ellipse cx="100" cy="146" rx="46" ry="38" fill="#27AE60"/>
  <!-- Bubbles in liquid -->
  <circle cx="82"  cy="148" r="8"  fill="#52E88A" opacity="0.7"/>
  <circle cx="112" cy="155" r="6"  fill="#52E88A" opacity="0.7"/>
  <circle cx="98"  cy="135" r="5"  fill="#52E88A" opacity="0.7"/>
  <circle cx="118" cy="138" r="4"  fill="#52E88A" opacity="0.6"/>
  <!-- Bottle shine -->
  <ellipse cx="76" cy="102" rx="12" ry="22" fill="rgba(255,255,255,0.2)" transform="rotate(-20,76,102)"/>
  <!-- Bottle outline -->
  <ellipse cx="100" cy="130" rx="55" ry="58" fill="none" stroke="#7D3C98" stroke-width="3"/>
  <rect x="78" y="46" width="44" height="28" rx="4" fill="none" stroke="#7D3C98" stroke-width="2"/>
  <!-- Magic sparkles -->
  <g fill="#F1C40F">
    <circle cx="42"  cy="80"  r="4"/>
    <circle cx="158" cy="75"  r="3"/>
    <circle cx="35"  cy="130" r="3"/>
    <circle cx="165" cy="120" r="4"/>
  </g>
  <g stroke="#F1C40F" stroke-width="1.5" fill="none">
    <line x1="42" y1="70" x2="42" y2="90"/>
    <line x1="32" y1="80" x2="52" y2="80"/>
  </g>
</svg>
