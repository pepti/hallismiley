<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta -->
  <title>Halli Smiley — Icelandic Carpenter &amp; Computer Scientist</title>
  <meta name="description" content="Portfolio of Halli, an Icelandic carpenter and computer scientist. Twenty years of precision joinery and timber framing, combined with full-stack web development. Based in Iceland." />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Halli" />
  <link rel="canonical" href="https://halliprojects.is/" />

  <!-- Geo targeting -->
  <meta name="geo.region" content="IS" />
  <meta name="geo.placename" content="Iceland" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="en_IS" />
  <meta property="og:url" content="https://halliprojects.is/" />
  <meta property="og:title" content="Halli Smiley — Icelandic Carpenter &amp; Computer Scientist" />
  <meta property="og:description" content="Twenty years of carpentry precision — timber frames, hand-cut joinery, bespoke cabinetry — married to modern full-stack software engineering. Based in Iceland." />
  <!-- TODO before launch: create og-image.jpg (1200×630 px) and place it in public/ -->
  <meta property="og:image" content="https://halliprojects.is/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:site_name" content="Halli Smiley" />

  <!-- Favicon -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- Google Fonts
       Note: SRI (Subresource Integrity) hashes cannot be applied to Google Fonts
       stylesheet URLs because Google dynamically varies the response per User-Agent
       to serve optimally subsetted fonts. The URL content changes, so any fixed hash
       would immediately fail. crossorigin="anonymous" is still applied for CORS. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,900;1,700;1,900&family=Barlow:ital,wght@0,400;0,600;0,700;1,400&family=Cinzel:wght@700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" crossorigin="anonymous" />

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="/css/main.css" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Halli",
    "url": "https://halliprojects.is",
    "description": "Icelandic carpenter and computer scientist with twenty years of precision joinery and timber framing, combined with full-stack web development in Node.js and PostgreSQL.",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "IS",
      "addressLocality": "Iceland"
    },
    "knowsAbout": [
      "Carpentry", "Timber Framing", "Hand-Cut Joinery", "Cabinetry",
      "JavaScript", "Node.js", "PostgreSQL", "Full-Stack Development",
      "REST APIs", "JWT Authentication"
    ],
    "sameAs": [
      "https://github.com/pepti",
      "https://www.linkedin.com/in/halliv/"
    ]
  }
  </script>

  <!-- Analytics: loaded only after cookie consent (see /js/consent.js).
       When you have a real GA4 Measurement ID, set window.GA_MEASUREMENT_ID
       before this script, or pass it to loadAnalytics() inside consent.js. -->
  <script src="/js/consent.js" defer></script>
</head>
<body>
  <a href="#main-content" class="skip-nav">Skip to main content</a>
  <div id="app"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
