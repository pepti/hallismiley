name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Service-principal auth via the legacy creds JSON in AZURE_CREDENTIALS.
      # The repo also has AZURE_CLIENT_ID/TENANT_ID/SUBSCRIPTION_ID slots left
      # over from a half-wired OIDC attempt; when those get populated we can
      # switch back to OIDC (permissions: id-token: write + the 3 with:
      # inputs) and retire this single-secret approach.
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: hallismileyacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            hallismileyacr.azurecr.io/hallismiley:latest
            hallismileyacr.azurecr.io/hallismiley:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: hallismiley-app
          images: hallismileyacr.azurecr.io/hallismiley:${{ github.sha }}
