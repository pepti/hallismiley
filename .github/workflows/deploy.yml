name: Deploy to Azure

# Deploy is gated on CI: it runs only after the CI workflow finishes
# successfully on main, deploying the exact SHA that CI validated.
# `workflow_dispatch` stays available as a manual override — used when
# we need to ship an image without re-running CI (e.g. after a
# subscription/billing outage where the previous CI was already green).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Default every job to read-only; the deploy job's own permissions block
# grants the OIDC id-token it needs and overrides this at job level.
permissions:
  contents: read

# Two deploys must never interleave (each ends in a webapp restart); queue
# them instead of cancelling — a cancelled deploy would strand main un-shipped.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Fail closed: deploy only fires when CI succeeded for this SHA, or
    # when a human explicitly dispatched the workflow. Any CI failure
    # (red tests, audit, docker build) leaves prod untouched.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    # Required for OIDC federated login against Azure AD — the job gets a
    # short-lived token from GitHub that Azure exchanges for a service-
    # principal session, no long-lived secrets in the repo.
    permissions:
      id-token: write
      contents: read

    env:
      # For workflow_run, deploy the exact commit CI validated (not whatever
      # is at main HEAD now — main may have advanced between CI completion
      # and this job starting). For workflow_dispatch, fall back to the SHA
      # at the time of dispatch.
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # `az acr login` uses the Azure session above — no ACR_USERNAME /
      # ACR_PASSWORD needed. It populates Docker's credential store so
      # the subsequent build-push step can push images without a second
      # auth round-trip.
      - name: Log in to ACR
        run: az acr login --name hallismileyacr

      # The default docker driver can't export a build cache; the
      # docker-container driver can, which is what makes cache-to below work.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # GHA layer cache so unchanged layers (notably the ~200 MB `npm ci`
      # node_modules layer) are reused across deploys instead of rebuilt and
      # pushed to ACR as brand-new blobs every time. mode=max caches the deps
      # stage too, not just the final image. provenance:false keeps the pushed
      # artifact a plain single-arch manifest — the default (an OCI index with
      # an attestation child) would change what the weekly ACR purge sees and
      # what App Service pulls.
      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            hallismileyacr.azurecr.io/hallismiley:latest
            hallismileyacr.azurecr.io/hallismiley:${{ env.DEPLOY_SHA }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@02a81bead70021f5284939794bcec79c271ab383 # v3
        with:
          app-name: hallismiley-app
          images: hallismileyacr.azurecr.io/hallismiley:${{ env.DEPLOY_SHA }}

      # azure/webapps-deploy updates the configured image tag but on B1
      # (no slots) doesn't reliably trigger a container swap — observed on
      # 2026-04-24 where six successive successful deploys all reported
      # success while the container kept running a 10-hour-old image. Force
      # a restart so the new image is actually running. Brief (~30-60s)
      # unavailability per deploy until we move to a tier with slots.
      - name: Force restart to activate new image
        run: az webapp restart --resource-group hallismiley-rg --name hallismiley-app

  # ── Failsafe: email halli@hallismiley.is when merged code does NOT go live ──
  # Two distinct "merged but not live" causes are covered:
  #   1. CI went red on main  → the deploy job above is SKIPPED (fail-closed).
  #   2. the deploy job RAN but errored (ACR/build/webapp/restart).
  # Both email via Resend (the app's provider). They no-op cleanly if the
  # RESEND_API_KEY secret isn't set, and run independently of `deploy` so an
  # alert can never block or break a deploy.

  alert-ci-blocked:
    name: Alert — CI red on main (deploy skipped)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Fires only when CI completed on main WITHOUT success — i.e. the exact
    # moment the deploy is being skipped. A manual workflow_dispatch never
    # reaches this branch. `cancelled` is excluded: CI only cancels when a run
    # is superseded (see ci.yml concurrency), which isn't a failure to alert on.
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success' && github.event.workflow_run.conclusion != 'cancelled' }}
    steps:
      - name: Email deploy-blocked alert (Resend)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
          CI_URL: ${{ github.event.workflow_run.html_url }}
          CI_TITLE: ${{ github.event.workflow_run.display_title }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not set — skipping deploy-blocked alert."; exit 0
          fi
          SHORT_SHA="${CI_SHA:0:9}"
          # jq builds the JSON so any character in the commit title/url is safely escaped.
          jq -n \
            --arg subj "⚠️ hallismiley — merged code did NOT deploy (CI ${CI_CONCLUSION} on main)" \
            --arg concl "$CI_CONCLUSION" \
            --arg sha "$SHORT_SHA" \
            --arg title "$CI_TITLE" \
            --arg url "$CI_URL" \
            '{
               from: "Hallismiley Deploy <noreply@hallismiley.is>",
               to: ["halli@hallismiley.is"],
               subject: $subj,
               html: ("<h2>⚠️ Merged code did NOT deploy</h2>"
                 + "<p>CI finished <strong>" + $concl + "</strong> on <code>main</code> for commit <code>" + $sha + "</code> — " + $title + ".</p>"
                 + "<p>The Azure deploy is gated on green CI, so it was <strong>skipped</strong>. The merged code is <strong>not live</strong>. Fix CI and it will auto-deploy, or run the “Deploy to Azure” workflow manually.</p>"
                 + "<p><a href=\"" + $url + "\">View the CI run →</a></p>")
             }' \
            | curl -sS --fail-with-body -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" \
                -d @-
          echo "Deploy-blocked alert emailed to halli@hallismiley.is."

  alert-deploy-failed:
    name: Alert — Azure deploy failed
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]
    # Only when the deploy job actually RAN and failed (not when it was skipped
    # because CI was red — that case is covered by alert-ci-blocked above).
    if: ${{ needs.deploy.result == 'failure' }}
    steps:
      - name: Email deploy-failed alert (Resend)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY not set — skipping deploy-failed alert."; exit 0
          fi
          SHORT_SHA="${DEPLOY_SHA:0:9}"
          jq -n \
            --arg sha "$SHORT_SHA" \
            --arg url "$RUN_URL" \
            '{
               from: "Hallismiley Deploy <noreply@hallismiley.is>",
               to: ["halli@hallismiley.is"],
               subject: "⚠️ hallismiley — Azure deploy FAILED",
               html: ("<h2>⚠️ Azure deploy failed</h2>"
                 + "<p>The deploy job for <code>main</code> (commit <code>" + $sha + "</code>) errored, so the merged code is <strong>not live</strong> on Azure.</p>"
                 + "<p><a href=\"" + $url + "\">View the deploy run →</a></p>")
             }' \
            | curl -sS --fail-with-body -X POST https://api.resend.com/emails \
                -H "Authorization: Bearer $RESEND_API_KEY" \
                -H "Content-Type: application/json" \
                -d @-
          echo "Deploy-failed alert emailed to halli@hallismiley.is."
